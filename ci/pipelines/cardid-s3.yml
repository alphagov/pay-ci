resources:
  - name: cardid-s3-pipeline-definition
    type: git
    icon: github
    source:
      uri: https://github.com/alphagov/pay-ci
      branch: pp-12111/s3_bin_ranges
      paths:
        - ci/pipelines/cardid-s3.yml
      username: alphagov-pay-ci-concourse
      password: ((github-access-token))
  - name: pay-ci
    type: git
    icon: github
    source:
      uri: https://github.com/alphagov/pay-ci
      branch: pp-12111/s3_bin_ranges
      username: alphagov-pay-ci-concourse
      password: ((github-access-token))

  # Github Releases
  - name: cardid-git-release
    type: git
    icon: github
    source:
      uri: https://github.com/alphagov/pay-cardid
      branch: pp-12111/s3_bin_ranges
      username: alphagov-pay-ci-concourse
      password: ((github-access-token))

  # S3 buckets
  - name: worldpay-bin-ranges
    type: s3
    icon: file-delimited
    source:
      access_key_id: ((readonly_access_key_id))
      secret_access_key: ((readonly_secret_access_key))
      session_token: ((readonly_session_token))
      aws_role_arn: arn:aws:iam::673337093959:role/dev-concourse_dev_worker_promoted_bin_ranges_read_only
      region_name: eu-west-1
      private: true
      bucket: bin-ranges-promoted-dev
      versioned_file: latest/worldpay-v3.csv

groups:
  - name: cardid
    jobs:
      - build-and-push-cardid-s3-candidate

  - name: update-cardid-s3-pipeline
    jobs:
      - update-cardid-s3-pipeline

jobs:
  - name: update-cardid-s3-pipeline
    plan:
      - get: cardid-s3-pipeline-definition
        trigger: true
      - set_pipeline: cardid-s3
        file: cardid-s3-pipeline-definition/ci/pipelines/cardid-s3.yml
  - name: build-and-push-cardid-s3-candidate
    plan:
      - in_parallel:
        - get: pay-ci
        - get: worldpay-bin-ranges
        - get: cardid-git-release
          trigger: false
          params:
            submodules: none
      - in_parallel:
        - task: assume-role
          file: pay-ci/ci/tasks/assume-role.yml
          params:
            AWS_ROLE_ARN: arn:aws:iam::((pay_aws_test_account_id)):role/pay-cd-pay-dev-codebuild-builder-test-12
            AWS_ROLE_SESSION_NAME: codebuild-assume-role
      - load_var: role
        file: assume-role/assume-role.json
        format: json
      - task: prepare-codebuild
        file: pay-ci/ci/tasks/prepare-codebuild-multiarch.yml
        params:
          PROJECT_TO_BUILD: cardid-s3
          AWS_ACCESS_KEY_ID: ((.:role.AWS_ACCESS_KEY_ID))
          AWS_SECRET_ACCESS_KEY: ((.:role.AWS_SECRET_ACCESS_KEY))
          AWS_SESSION_TOKEN: ((.:role.AWS_SESSION_TOKEN))
          RELEASE_NUMBER: S3-1
          RELEASE_NAME: S3-TEST
          RELEASE_SHA: abfa0f01d7a57340afdcac783ab075282201b450
          BUILD_DATE: 2024-03-18
      - task: generate-docker-creds-config
        file: pay-ci/ci/tasks/generate-docker-config-file.yml
        params:
          USERNAME: ((docker-username))
          PASSWORD: ((docker-access-token))
          EMAIL: ((docker-email))
      - in_parallel:
        - task: run-codebuild-cardid-amd64
          attempts: 3
          file: pay-ci/ci/tasks/run-codebuild.yml
          params:
            PATH_TO_CONFIG: "../../../../run-codebuild-configuration/cardid-s3-amd64.json"
            AWS_ACCESS_KEY_ID: ((.:role.AWS_ACCESS_KEY_ID))
            AWS_SECRET_ACCESS_KEY: ((.:role.AWS_SECRET_ACCESS_KEY))
            AWS_SESSION_TOKEN: ((.:role.AWS_SESSION_TOKEN))
        - task: run-codebuild-cardid-armv8
          attempts: 3
          file: pay-ci/ci/tasks/run-codebuild.yml
          params:
            PATH_TO_CONFIG: "../../../../run-codebuild-configuration/cardid-s3-armv8.json"
            AWS_ACCESS_KEY_ID: ((.:role.AWS_ACCESS_KEY_ID))
            AWS_SECRET_ACCESS_KEY: ((.:role.AWS_SECRET_ACCESS_KEY))
            AWS_SESSION_TOKEN: ((.:role.AWS_SESSION_TOKEN))
      - task: run-codebuild-cardid-manifest
        attempts: 3
        file: pay-ci/ci/tasks/run-codebuild.yml
        params:
          PATH_TO_CONFIG: "../../../../run-codebuild-configuration/cardid-s3-manifest.json"
          AWS_ACCESS_KEY_ID: ((.:role.AWS_ACCESS_KEY_ID))
          AWS_SECRET_ACCESS_KEY: ((.:role.AWS_SECRET_ACCESS_KEY))
          AWS_SESSION_TOKEN: ((.:role.AWS_SESSION_TOKEN))
