resources:
  - name: configuration-repo
    type: git
    icon: github
    source:
      uri: https://github.com/govuk-pay/configuration.git
      branch: feature/PP-15179-app-auth
      username: "alphagov-pay-ci-concourse"
      password: ((github-access-token))
  - name: pay-access-control
    type: git
    icon: github
    source:
      uri: https://github.com/alphagov/pay-access-control
      branch: main
      username: "alphagov-pay-ci-concourse"
      password: ((github-access-token))
  - name: pay-ci
    type: git
    icon: github
    source:
      uri: https://github.com/alphagov/pay-ci
      branch: master

jobs:
  - name: terraform-plan
    plan:
      - get: configuration-repo
        trigger: true
      - get: pay-access-control
      - get: pay-ci
      - task: assume-role
        file: pay-ci/ci/tasks/assume-role.yml
        params:
          AWS_ROLE_ARN: arn:aws:iam::((pay_aws_test_account_id)):role/concourse
          AWS_ROLE_SESSION_NAME: github-user-management
      - load_var: role
        file: assume-role/assume-role.json
        format: json
      - task: terraform-plan
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: hashicorp/terraform
              tag: latest
          inputs:
            - name: configuration-repo
            - name: pay-access-control
            - name: pay-ci
          params:
            AWS_ACCESS_KEY_ID: ((.:role.AWS_ACCESS_KEY_ID))
            AWS_SECRET_ACCESS_KEY: ((.:role.AWS_SECRET_ACCESS_KEY))
            AWS_SESSION_TOKEN: ((.:role.AWS_SESSION_TOKEN))
            AWS_REGION: eu-west-1
            GITHUB_OWNER: govuk-pay
            TF_VAR_github_app_id: ((github_app_id))
            TF_VAR_github_app_installation_id: ((github_app_installation_id))
            RAW_GITHUB_APP_PEM: ((github_app_pem))
          run:
            path: sh
            args:
              - -exc
              - |
                apk add --no-cache python3 py3-pip bash aws-cli || true
                ln -sf /usr/bin/python3 /usr/local/bin/python || true

                set +x
                printf '%b' "$RAW_GITHUB_APP_PEM" > /tmp/github-app.pem
                chmod 600 /tmp/github-app.pem
                export TF_VAR_github_app_pem="$(cat /tmp/github-app.pem)"
                set -x

                aws sts get-caller-identity

                python3 -m pip install --break-system-packages -r pay-access-control/scripts/requirements.txt
                sed -i '/python -m pip install/d' configuration-repo/scripts/generate-csvs.sh
                cd configuration-repo
                bash scripts/generate-csvs.sh

                cd teams
                terraform init
                terraform validate
                terraform plan -out=tfplan
