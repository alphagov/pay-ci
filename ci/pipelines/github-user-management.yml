resources:
  - name: configuration-repo
    type: git
    source:
      uri: https://github.com/govuk-pay/configuration.git
      branch: main

  - name: pay-ci
    type: git
    source:
      uri: https://github.com/alphagov/pay-ci
      branch: master

jobs:
  - name: terraform-plan

    plan:
      - get: configuration-repo
        trigger: true

      - get: pay-ci

      - task: assume-role
        file: pay-ci/ci/tasks/assume-role.yml
        params:
          AWS_ROLE_ARN: arn:aws:iam::((pay_aws_deploy_account_id)):role/concourse
          AWS_ROLE_SESSION_NAME: github-user-management

      - load_var: role
        file: assume-role/assume-role.json
        format: json

      - task: terraform-plan

        config:
          platform: linux

          image_resource:
            type: registry-image
            source:
              repository: hashicorp/terraform
              tag: latest

          inputs:
            - name: configuration-repo

          params:
            AWS_ACCESS_KEY_ID: ((.:role.AWS_ACCESS_KEY_ID))
            AWS_SECRET_ACCESS_KEY: ((.:role.AWS_SECRET_ACCESS_KEY))
            AWS_SESSION_TOKEN: ((.:role.AWS_SESSION_TOKEN))
            AWS_REGION: eu-west-1

          run:
            path: sh
            args:
              - -exc
              - |
                echo "===== AWS Identity ====="

                apk add --no-cache aws-cli || true

                aws sts get-caller-identity

                echo "===== Testing State File ====="

                aws s3api head-object \
                  --bucket pay-govuk-terraform-state-deploy \
                  --key github-configuration.tfstate || echo "State file check returned non-zero (may not exist yet)"

                echo "===== Terraform Version ====="

                terraform version

                cd configuration-repo/teams

                echo "===== Terraform Init ====="

                terraform init

                echo "===== Terraform Validate ====="

                terraform validate

                echo "===== Terraform Plan ====="

                terraform plan -out=tfplan

                echo "PLAN COMPLETED"

