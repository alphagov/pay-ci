name: Test octokit/rest in node-runner

on:
  pull_request:
    paths:
      - ci/docker/node-runner/**
      - .github/workflows/test-node-runner-octokit.yml

jobs:
  test-octokit-in-node-runner:
    runs-on: ubuntu-latest
    name: Run test script for octokit/rest
    
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: 'ci/scripts/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'ci/scripts/package-lock.json'
      - name: Install dependencies
        working-directory: 'ci/scripts'
        run: npm ci
      - name: Run test
        run: node test-octokit-repo-tag-download.js
        working-directory: 'ci/scripts'