resources:
  - name: github-user-management-pipeline-definition
    type: git
    icon: github
    source:
      uri: https://github.com/alphagov/pay-ci
      branch: master
      paths:
        - ci/pipelines/github-user-management.yml

  - name: configuration-repo
    type: git
    icon: github
    source:
      uri: https://github.com/govuk-pay/configuration   # TEMP: change branch line below after configuration PR merges to main
      branch: feature/PP-15179-app-auth
      username: alphagov-pay-ci-concourse
      password: ((github-access-token))

  - name: pay-access-control
    type: git
    icon: github
    source:
      uri: https://github.com/alphagov/pay-access-control
      branch: main
      username: alphagov-pay-ci-concourse
      password: ((github-access-token))

  - name: pay-ci
    type: git
    icon: github
    source:
      uri: https://github.com/alphagov/pay-ci
      branch: master

jobs:
  - name: update-github-user-management-pipeline
    plan:
      - get: github-user-management-pipeline-definition
        trigger: true
      - set_pipeline: github-user-management
        file: github-user-management-pipeline-definition/ci/pipelines/github-user-management.yml

  - name: terraform-plan
    plan:
      - get: configuration-repo
        trigger: true
      - get: pay-access-control
        trigger: true                       # rebuild when access-control config changes
      - get: pay-ci

      - task: assume-role
        file: pay-ci/ci/tasks/assume-role.yml
        params:
          AWS_ROLE_ARN: arn:aws:iam::((pay_aws_test_account_id)):role/concourse
          AWS_ROLE_SESSION_NAME: github-user-management
      - load_var: role
        file: assume-role/assume-role.json
        format: json

      - task: find-terraform-version
        file: pay-ci/ci/tasks/find-terraform-version.yml
        input_mapping:
          pay-infra: configuration-repo
        params:
          TERRAFORM_ROOT: pay-infra
      - load_var: terraform-version
        file: terraform-version/.terraform-version

      - task: generate-csvs
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: governmentdigitalservice/pay-concourse-runner
              tag: latest
          inputs:
            - name: configuration-repo
            - name: pay-access-control
          outputs:
            - name: configuration-with-csvs
          run:
            path: /bin/bash
            args:
              - -euc
              - |
                python3 -m venv /tmp/venv
                . /tmp/venv/bin/activate
                pip install --quiet -r pay-access-control/scripts/requirements.txt

                cd configuration-repo
                bash scripts/generate-csvs.sh
                cd ..

                cp -R configuration-repo/. configuration-with-csvs/

      - task: terraform-plan
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: hashicorp/terraform
              tag: "((.:terraform-version))"
          inputs:
            - name: configuration-with-csvs
          params:
            AWS_ACCESS_KEY_ID: ((.:role.AWS_ACCESS_KEY_ID))
            AWS_SECRET_ACCESS_KEY: ((.:role.AWS_SECRET_ACCESS_KEY))
            AWS_SESSION_TOKEN: ((.:role.AWS_SESSION_TOKEN))
            AWS_REGION: eu-west-1
            GITHUB_APP_ID: ((github_app_id))
            GITHUB_APP_INSTALLATION_ID: ((github_app_installation_id))
            GITHUB_APP_PEM_FILE: ((github_app_pem))
            GITHUB_OWNER: govuk-pay
          run:
            path: /bin/sh
            args:
              - -euc                         
              - |
                cd configuration-with-csvs/teams
                terraform init -input=false
                terraform validate
                terraform plan -out=tfplan -lock=false -input=false    
